<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>AK Senior Demo Team</title>

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icon-192.png">
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #222240;
  --accent: #e94560;
  --accent-glow: rgba(233, 69, 96, 0.3);
  --yes: #00c853;
  --no: #ff1744;
  --maybe: #ffab00;
  --text: #eee;
  --text-dim: #888;
  --border: #2a2a4a;
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  overflow-x: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo {
  height: 38px;
  width: auto;
  flex-shrink: 0;
}
.header-text {
  flex: 1;
  min-width: 0;
}
.header-text h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.header-text .header-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 1px;
}
.header-user {
  flex-shrink: 0;
  text-align: right;
}
.header-user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}
.header-user-change {
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  text-decoration: none;
  border: none;
  background: none;
  padding: 0;
}

/* Tabs */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 54px;
  z-index: 99;
}
.tab {
  flex: 1;
  padding: 12px 6px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  border: none;
  background: none;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.tab.active { color: var(--accent); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  width: 60%;
  height: 3px;
  background: var(--accent);
  border-radius: 3px 3px 0 0;
}

/* Section */
.section { display: none; padding: 16px; }
.section.active { display: block; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-card {
  flex: 0 0 auto;
  min-width: 100px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-card .num { font-size: 24px; font-weight: 700; }
.stat-card .label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.stat-card.accent .num { color: var(--accent); }

/* Session cards */
.session-card {
  background: var(--card);
  border-radius: var(--radius);
  margin-bottom: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: border-color 0.2s;
}
.session-card.upcoming { border-left: 3px solid var(--accent); }
.session-card.past { opacity: 0.5; }

.session-header {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  cursor: pointer;
}
.session-date { font-size: 15px; font-weight: 600; }
.session-day { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.session-time { font-size: 13px; color: var(--text-dim); }
.session-type {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 6px;
  margin-top: 4px;
}
.session-type.weekly { background: rgba(233, 69, 96, 0.15); color: var(--accent); }
.session-type.monthly { background: rgba(255, 171, 0, 0.15); color: var(--maybe); }
.session-type.tournament { background: rgba(0, 200, 83, 0.15); color: var(--yes); }
.session-type.performance { background: rgba(224, 64, 251, 0.15); color: #e040fb; }

/* RSVP buttons */
.rsvp-bar {
  display: flex;
  gap: 8px;
  padding: 0 16px 14px;
}
.rsvp-btn {
  flex: 1;
  padding: 10px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: none;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.rsvp-btn:active { transform: scale(0.95); }
.rsvp-btn.yes.selected { background: rgba(0, 200, 83, 0.15); border-color: var(--yes); color: var(--yes); }
.rsvp-btn.no.selected { background: rgba(255, 23, 68, 0.15); border-color: var(--no); color: var(--no); }
.rsvp-btn.maybe.selected { background: rgba(255, 171, 0, 0.15); border-color: var(--maybe); color: var(--maybe); }

/* Attendance detail (expandable) */
.session-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.session-detail.open { max-height: 600px; }
.attendance-list {
  padding: 0 16px 14px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.attendance-list h4 { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.att-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
}
.att-name { font-size: 14px; }
.att-status {
  font-size: 12px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 6px;
}
.att-status.yes { background: rgba(0, 200, 83, 0.15); color: var(--yes); }
.att-status.no { background: rgba(255, 23, 68, 0.15); color: var(--no); }
.att-status.maybe { background: rgba(255, 171, 0, 0.15); color: var(--maybe); }
.att-status.none { color: var(--text-dim); }

/* Headcount badge */
.headcount {
  font-size: 12px;
  color: var(--text-dim);
  padding: 0 16px 10px;
}
.headcount span { font-weight: 700; }
.headcount .yes-count { color: var(--yes); }
.headcount .maybe-count { color: var(--maybe); }
.headcount .no-count { color: var(--no); }
.headcount .pending-count { color: var(--text-dim); }

/* Resources */
.resource-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  overflow: hidden;
}
.resource-header {
  padding: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  -webkit-tap-highlight-color: transparent;
}
.resource-title { font-size: 15px; font-weight: 600; }
.resource-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.resource-chevron { color: var(--text-dim); font-size: 14px; flex-shrink: 0; transition: transform 0.2s; }
.resource-chevron.open { transform: rotate(90deg); }
.resource-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.resource-body.open { display: block; }
.resource-start {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 12px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  font-style: italic;
}
.resource-start strong { color: var(--text); font-style: normal; }
.step-list { list-style: none; counter-reset: steps; margin-top: 12px; }
.step-item {
  counter-increment: steps;
  padding: 8px 0 8px 36px;
  position: relative;
  font-size: 14px;
  line-height: 1.45;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.step-item:last-child { border-bottom: none; }
.step-item::before {
  content: counter(steps);
  position: absolute;
  left: 0; top: 8px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.video-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  padding: 10px 16px;
  background: rgba(233, 69, 96, 0.15);
  border: 1px solid rgba(233, 69, 96, 0.3);
  border-radius: 10px;
  color: var(--accent);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
}

/* My Skills */
.skill-row {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  padding: 14px 16px;
}
.skill-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.skill-dots {
  display: flex;
  gap: 8px;
}
.skill-dot {
  width: 40px; height: 36px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: none;
  color: var(--text-dim);
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.skill-dot.active {
  border-color: var(--accent);
  background: rgba(233, 69, 96, 0.2);
  color: var(--accent);
}
.skill-dot.level-1.active { border-color: #ffab00; background: rgba(255,171,0,0.2); color: #ffab00; }
.skill-dot.level-2.active { border-color: #448aff; background: rgba(68,138,255,0.2); color: #448aff; }
.skill-dot.level-3.active { border-color: #00c853; background: rgba(0,200,83,0.2); color: #00c853; }
.skill-legend {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.skill-legend span { display: flex; align-items: center; gap: 4px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
.suggest-bar {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.suggest-input {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
}
.suggest-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px;
}

/* Admin tab */
.admin-sub-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.admin-sub-tab {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.admin-sub-tab.active {
  background: rgba(233, 69, 96, 0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.admin-grid {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -16px;
  padding: 0 16px;
}
.admin-table {
  width: max-content;
  min-width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.admin-table th {
  background: var(--card);
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 8px;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 2;
  white-space: nowrap;
}
.admin-table th:first-child {
  position: sticky;
  left: 0;
  z-index: 3;
  min-width: 100px;
}
.admin-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.admin-table td:first-child {
  position: sticky;
  left: 0;
  background: var(--bg);
  font-weight: 600;
  font-size: 13px;
  z-index: 1;
  white-space: nowrap;
}
.admin-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.admin-table tr:nth-child(even) td:first-child { background: var(--bg); }
.admin-select {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 4px;
  font-size: 12px;
  cursor: pointer;
  width: 100%;
  min-width: 60px;
  appearance: auto;
  -webkit-appearance: auto;
}
.admin-select.val-yes { border-color: var(--yes); color: var(--yes); }
.admin-select.val-no { border-color: var(--no); color: var(--no); }
.admin-select.val-maybe { border-color: var(--maybe); color: var(--maybe); }
.admin-select.val-0 { border-color: var(--text-dim); color: var(--text-dim); }
.admin-select.val-1 { border-color: #ffab00; color: #ffab00; }
.admin-select.val-2 { border-color: #448aff; color: #448aff; }
.admin-select.val-3 { border-color: #00c853; color: #00c853; }
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

/* Loading & Error */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  background: rgba(255, 23, 68, 0.1);
  border: 1px solid rgba(255, 23, 68, 0.3);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 16px;
  font-size: 14px;
  color: var(--no);
}

/* Setup screen */
.setup-screen {
  padding: 40px 24px;
  text-align: center;
}
.setup-screen h2 { margin-bottom: 12px; font-size: 22px; }
.setup-screen p { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
.setup-input {
  width: 100%;
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  margin-bottom: 12px;
}
.setup-input::placeholder { color: var(--text-dim); }
.setup-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.setup-btn:active { opacity: 0.8; }

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px;
  border: none;
  background: none;
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* Refresh indicator */
.refresh-note {
  text-align: center;
  padding: 8px;
  font-size: 11px;
  color: var(--text-dim);
}

/* Filter pills */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-pill.active {
  background: rgba(233, 69, 96, 0.15);
  border-color: var(--accent);
  color: var(--accent);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Pull-to-refresh */
.ptr-indicator {
  text-align: center;
  height: 0;
  overflow: hidden;
  transition: height 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 13px;
  background: var(--bg);
}
.ptr-indicator .ptr-spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin-right: 8px;
  display: none;
}
.ptr-indicator.refreshing .ptr-spinner {
  display: inline-block;
  animation: spin 0.8s linear infinite;
}
.ptr-indicator .ptr-arrow {
  margin-right: 8px;
  transition: transform 0.2s;
  display: inline-block;
}
.ptr-indicator.ready .ptr-arrow { transform: rotate(180deg); }
.ptr-indicator.refreshing .ptr-arrow { display: none; }

/* Chat */
.chat-section {
  display: none;
  flex-direction: column;
  height: calc(100vh - 160px);
  padding-bottom: 0;
}
.chat-section.active { display: flex; }
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 14px;
}
.msg .msg-name { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
.msg .msg-text { font-size: 14px; line-height: 1.45; word-wrap: break-word; }
.msg .msg-time { font-size: 10px; color: var(--text-dim); margin-top: 4px; text-align: right; }
.msg.other {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.mine {
  align-self: flex-end;
  background: rgba(233, 69, 96, 0.15);
  border: 1px solid rgba(233, 69, 96, 0.3);
  border-bottom-right-radius: 4px;
}
.msg.mine .msg-name { color: var(--accent); }
.compose {
  display: flex;
  gap: 8px;
  padding: 12px 16px 28px;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding-bottom: max(28px, calc(env(safe-area-inset-bottom) + 16px));
}
.compose input {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 16px;
  font-size: 14px;
  outline: none;
}
.compose input::placeholder { color: var(--text-dim); }
.compose button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.compose button:active { opacity: 0.7; }
.compose button:disabled { opacity: 0.4; }
.chat-empty {
  text-align: center;
  color: var(--text-dim);
  padding: 60px 20px;
  font-size: 14px;
}

/* Unread badge on chat tab */
.tab .badge {
  display: none;
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  position: absolute;
  top: 8px;
  right: calc(50% - 36px);
}
.tab .badge.show { display: block; }

/* Update banner */
.update-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 600;
  z-index: 300;
  transform: translateY(-100%);
  transition: transform 0.3s ease;
}
.update-banner.show { transform: translateY(0); }
.update-banner button {
  background: rgba(255,255,255,0.25);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="update-banner" id="updateBanner">
  New version available!
  <button onclick="applyUpdate()">Update Now</button>
</div>

<!-- Welcome screen — pick your name on first visit -->
<div id="welcomeScreen" style="display:none;">
  <div class="header">
    <img src="ak-logo.png" class="header-logo" alt="Action Karate">
    <div class="header-text">
      <h1>Senior Demo Team</h1>
      <div class="header-sub">Newtown</div>
    </div>
  </div>
  <div class="setup-screen">
    <h2>Welcome!</h2>
    <p>Select your name to get started. This will be saved so you don't have to pick it again.</p>
    <select id="welcomeSelect" class="setup-input" style="padding:14px 12px; font-size:16px; appearance:auto; -webkit-appearance:auto;">
      <option value="" disabled selected>Choose your name...</option>
    </select>
    <button class="setup-btn" onclick="confirmName()" id="confirmBtn" disabled>That's Me — Let's Go</button>
    <p style="margin-top:24px; font-size:13px; color:var(--text-dim);">Not on the list?</p>
    <button class="setup-btn" style="background:var(--card); border:1px solid var(--border); margin-top:8px; font-size:14px;" onclick="requestAccess()">Request to be added</button>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none;">
  <div class="ptr-indicator" id="ptrIndicator">
    <span class="ptr-arrow">&#8595;</span>
    <span class="ptr-spinner"></span>
    <span class="ptr-text">Pull to refresh</span>
  </div>
  <div class="header">
    <img src="ak-logo.png" class="header-logo" alt="Action Karate">
    <div class="header-text">
      <h1>Senior Demo Team</h1>
      <div class="header-sub">Newtown</div>
    </div>
    <div class="header-user" id="userBar">
      <div class="header-user-name" id="lockedName"></div>
      <button class="header-user-change" onclick="changeName()">Change</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="schedule" onclick="switchTab('schedule')">Schedule</button>
    <button class="tab" data-tab="chat" onclick="switchTab('chat')">Team Chat<span class="badge" id="chatBadge"></span></button>
    <button class="tab" data-tab="admin" onclick="switchTab('admin')" id="adminTab" style="display:none;">Admin</button>
  </div>

  <div id="loadingView" class="loading">
    <div class="spinner"></div>
    <p>Loading schedule...</p>
  </div>

  <div id="errorView" class="error-banner" style="display:none;"></div>

  <!-- Schedule tab -->
  <div id="scheduleSection" class="section active">
    <div class="filter-bar">
      <button class="filter-pill active" data-filter="upcoming" onclick="setFilter('upcoming')">Upcoming</button>
      <button class="filter-pill" data-filter="past" onclick="setFilter('past')">Past</button>
      <button class="filter-pill" data-filter="thursday" onclick="setFilter('thursday')">Thursdays</button>
      <button class="filter-pill" data-filter="sunday" onclick="setFilter('sunday')">Sundays</button>
    </div>
    <div id="sessionList"></div>
  </div>  </div>

  <!-- Chat tab -->
  <div id="chatSection" class="chat-section">
    <div class="messages" id="messageList">
      <div class="chat-empty" id="chatEmpty">Loading messages...</div>
    </div>
    <div class="compose">
      <input id="chatInput" placeholder="Message the team..." maxlength="1000"
             onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}">
      <button id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
  </div>  <!-- Admin tab -->
  <div id="adminSection" class="section">
    <div class="admin-sub-tabs">
      <button class="admin-sub-tab active" data-subtab="attendance" onclick="switchAdminSub('attendance')">Schedule</button>
    </div>
    <div id="adminAttendanceView" class="admin-view" style="display:none;">
      <p style="text-align:center; color:var(--text-dim); padding:40px;">Loading schedule...</p>
    </div>
  </div>

  <div class="refresh-note" id="refreshNote"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- State ----
let API_URL = 'https://script.google.com/macros/s/AKfycbz0W-prZlWSod2B2WilXpF_dpiTe_Pfih2f509gT-fMmW1Y3trnTaUBHuOKO2TMpGFMIQ/exec';
const API_TOKEN = 'ak-senior-2026-newtown';
const APP_VERSION = '1.0';
let scheduleData = null;
const COACH_ROLES = ['coach', 'administrator'];
const ADMIN_USERS = ['Mr Kyle', 'Ms Alex'];
function isCoach(name) {
  if (!scheduleData || !scheduleData.memberRoles) return false;
  return COACH_ROLES.includes((scheduleData.memberRoles[name] || '').toLowerCase());
}
function isAdmin(name) {
  return ADMIN_USERS.includes(name);
}
function getTeamMembers() {
  return scheduleData.members.filter(m => !isCoach(m));
}
let currentUser = '';
let currentFilter = 'upcoming';
let currentTab = 'schedule';

// ---- Init ----
window.addEventListener('load', () => {
  loadData();
});

// ---- Storage helpers (in-memory fallback for environments without localStorage) ----
const memStore = {};
function getStored(key) {
  try { return localStorage.getItem(key); } catch(e) { return memStore[key] || null; }
}
function setStored(key, val) {
  try { localStorage.setItem(key, val); } catch(e) { memStore[key] = val; }
}

// ---- Data loading ----
async function loadData() {
  document.getElementById('loadingView').style.display = 'block';
  document.getElementById('errorView').style.display = 'none';
  try {
    const res = await fetch(API_URL + '?action=getSchedule&token=' + API_TOKEN);
    scheduleData = await res.json();
    if (scheduleData.error) throw new Error(scheduleData.error);

    const savedName = getStored('ak_user_locked');
    if (savedName && scheduleData.members.includes(savedName)) {
      // Returning user — go straight to app
      currentUser = savedName;
      gtag('set', 'user_properties', { team_member: currentUser });
      gtag('event', 'returning_visit', { team_member: currentUser });
      document.getElementById('lockedName').textContent = currentUser;
      if (isAdmin(currentUser)) document.getElementById('adminTab').style.display = '';
      document.getElementById('app').style.display = 'block';
      render();
      // Check for new chat messages in the background
      preloadChat();
    } else {
      // First-time visitor — show welcome screen
      showWelcomeScreen();
    }
    document.getElementById('refreshNote').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(err) {
    document.getElementById('errorView').textContent = 'Could not load data: ' + err.message;
    document.getElementById('errorView').style.display = 'block';
  }
  document.getElementById('loadingView').style.display = 'none';
}

// ---- Welcome / Name Selection ----
function showWelcomeScreen() {
  document.getElementById('welcomeScreen').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  const sel = document.getElementById('welcomeSelect');
  // Clear existing options (keep the placeholder)
  sel.innerHTML = '<option value="" disabled selected>Choose your name...</option>';
  scheduleData.members.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    document.getElementById('confirmBtn').disabled = !sel.value;
  });
}

function confirmName() {
  const sel = document.getElementById('welcomeSelect');
  if (!sel.value) return;
  currentUser = sel.value;
  setStored('ak_user_locked', currentUser);
  document.getElementById('lockedName').textContent = currentUser;
  if (isAdmin(currentUser)) document.getElementById('adminTab').style.display = '';
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  gtag('set', 'user_properties', { team_member: currentUser });
  gtag('event', 'login', { method: 'name_select', team_member: currentUser });
  render();
  showToast('Welcome, ' + currentUser + '!');
}

function changeName() {
  if (confirm('Switch to a different name? This will change who you appear as in the chat and attendance.')) {
    showWelcomeScreen();
  }
}

async function requestAccess() {
  const name = prompt('What name should we add you as? (e.g., "Mr Dave" or "Ms Sarah")');
  if (!name || !name.trim()) return;
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'postMessage',
        token: API_TOKEN,
        name: '(New Member Request)',
        message: name.trim() + ' is requesting to be added to the demo team roster.'
      })
    });
    alert('Your request has been sent to the team chat! Mr Tanner will add you to the roster.');
  } catch(err) {
    alert('Could not send request. Please text Mr Tanner directly.');
  }
}

// ---- Rendering ----
function render() {
  renderStats();
  renderSessions();
}

function parseDate(dateStr) {
  return new Date(dateStr.replace(/,/g, ''));
}

function renderStats() {
  // Stats bar removed — attendance counts now shown per session card
}

function formatShortDate(dateStr) {
  const d = parseDate(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderSessions() {
  const now = new Date();
  now.setHours(0,0,0,0);
  let sessions = scheduleData.sessions;

  if (currentFilter === 'upcoming') sessions = sessions.filter(s => parseDate(s.date) >= now);
  else if (currentFilter === 'past') sessions = sessions.filter(s => parseDate(s.date) < now).reverse();
  else if (currentFilter === 'thursday') sessions = sessions.filter(s => s.day === 'Thursday');
  else if (currentFilter === 'sunday') sessions = sessions.filter(s => s.day === 'Sunday');

  const container = document.getElementById('sessionList');
  if (sessions.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:var(--text-dim); padding:40px;">No sessions found.</p>';
    return;
  }

  container.innerHTML = sessions.map((s, idx) => {
    const isPast = parseDate(s.date) < now;
    const isUpcoming = !isPast;
    const myStatus = s.attendance[currentUser] || '';
    const teamOnly = getTeamMembers();
    const teamAtt = teamOnly.map(m => s.attendance[m] || '');
    const yesCount = teamAtt.filter(v => v === 'yes').length;
    const maybeCount = teamAtt.filter(v => v === 'maybe').length;
    const noCount = teamAtt.filter(v => v === 'no').length;
    const noResponse = teamOnly.length - yesCount - maybeCount - noCount;
    const userIsCoach = isCoach(currentUser);
    const typeLower = s.type.toLowerCase();
    const typeClass = typeLower.includes('monthly') ? 'monthly' : typeLower.includes('tournament') ? 'tournament' : typeLower.includes('performance') ? 'performance' : 'weekly';
    const id = 'session-' + idx;

    return `
      <div class="session-card ${isUpcoming ? 'upcoming' : ''} ${isPast ? 'past' : ''}">
        <div class="session-header" onclick="toggleDetail('${id}')">
          <div>
            <div class="session-date">${s.date}</div>
            <div class="session-day">${s.day}</div>
            <span class="session-type ${typeClass}">${s.type || s.day}</span>
          </div>
          <div style="text-align:right">
            <div class="session-time">${s.time}</div>
            <div style="font-size:12px; color:var(--text-dim); margin-top:4px;">${s.duration}</div>
          </div>
        </div>
        ${!isPast && !userIsCoach ? `
        <div class="rsvp-bar">
          <button class="rsvp-btn yes ${myStatus === 'yes' ? 'selected' : ''}" onclick="rsvp('${s.date}','yes',this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
            In
          </button>
          <button class="rsvp-btn maybe ${myStatus === 'maybe' ? 'selected' : ''}" onclick="rsvp('${s.date}','maybe',this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            Maybe
          </button>
          <button class="rsvp-btn no ${myStatus === 'no' ? 'selected' : ''}" onclick="rsvp('${s.date}','no',this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
            Out
          </button>
        </div>` : ''}
        <div class="headcount"><span class="yes-count">${yesCount}</span> in &middot; <span class="maybe-count">${maybeCount}</span> maybe &middot; <span class="no-count">${noCount}</span> out &middot; <span class="pending-count">${noResponse}</span> pending</div>
        <div class="session-detail" id="${id}">
          <div class="attendance-list">
            <h4>Team Availability</h4>
            ${getTeamMembers().map(m => {
              const st = s.attendance[m] || '';
              const label = st === 'yes' ? 'In' : st === 'no' ? 'Out' : st === 'maybe' ? 'Maybe' : '—';
              const cls = st || 'none';
              return `<div class="att-row"><span class="att-name">${m}</span><span class="att-status ${cls}">${label}</span></div>`;
            }).join('')}
            ${scheduleData.members.filter(m => isCoach(m)).length ? '<h4 style="margin-top:12px;">Coaches</h4>' : ''}
            ${scheduleData.members.filter(m => isCoach(m)).map(m => {
              const role = scheduleData.memberRoles[m] || 'Coach';
              return `<div class="att-row"><span class="att-name">${m}</span><span class="att-status none" style="font-style:italic;">${role}</span></div>`;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ---- Actions ----
function toggleDetail(id) {
  document.getElementById(id).classList.toggle('open');
}

async function rsvp(dateStr, status, btnEl) {
  if (!currentUser) { showToast('Select your name first'); return; }
  gtag('event', 'rsvp', { date: dateStr, status: status, team_member: currentUser });

  // Find current status
  const session = scheduleData.sessions.find(s => s.date === dateStr);
  if (!session) return;
  const current = session.attendance[currentUser];

  // Toggle off if same button
  const newStatus = (current === status) ? '' : status;

  // Optimistic update
  session.attendance[currentUser] = newStatus;
  render();
  showToast(newStatus ? `Marked as ${newStatus === 'yes' ? 'In' : newStatus === 'maybe' ? 'Maybe' : 'Out'}` : 'Cleared');

  // Send to server
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // Apps Script requires text/plain to avoid CORS preflight
      body: JSON.stringify({
        action: 'updateAttendance',
        token: API_TOKEN,
        name: currentUser,
        date: dateStr,
        status: newStatus
      })
    });
  } catch(err) {
    showToast('Sync failed — will retry');
    // Revert
    session.attendance[currentUser] = current;
    render();
  }
}

function switchTab(tab) {
  currentTab = tab;
  gtag('event', 'tab_view', { tab_name: tab, team_member: currentUser });
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('chatSection').classList.remove('active');

  if (tab === 'schedule') document.getElementById('scheduleSection').classList.add('active');
  else if (tab === 'my') document.getElementById('mySection').classList.add('active');
  else if (tab === 'chat') {
    document.getElementById('chatSection').classList.add('active');
    if (!chatLoaded) loadMessages();
    else renderMessages();
    markChatRead();
    scrollChatToBottom();
  } else if (tab === 'admin') {
    document.getElementById('adminSection').classList.add('active');
    if (!adminLoaded) loadAdmin();
  }
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.filter === filter));
  renderSessions();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- Chat ----
let chatLoaded = false;
let chatMessages = [];
let chatRefreshTimer = null;
let lastSeenMessageCount = parseInt(getStored('ak_chat_seen') || '0');

// Stable color palette for member names
const NAME_COLORS = ['#e94560','#00c853','#448aff','#ffab00','#e040fb','#00bcd4','#ff6e40','#76ff03','#ea80fc','#ffd740','#69f0ae','#40c4ff'];
const nameColorMap = {};
function getNameColor(name) {
  if (!nameColorMap[name]) {
    const idx = Object.keys(nameColorMap).length % NAME_COLORS.length;
    nameColorMap[name] = NAME_COLORS[idx];
  }
  return nameColorMap[name];
}

// Show cached messages instantly, then fetch fresh data
function restoreCachedChat() {
  try {
    const cached = getStored('ak_chat_cache');
    if (cached) {
      chatMessages = JSON.parse(cached);
      chatLoaded = true;
      updateChatBadge();
      renderMessages();
    }
  } catch(e) {}
}

// Preload chat in background right after schedule loads
async function preloadChat() {
  restoreCachedChat();
  await loadMessages();
}

async function loadMessages() {
  try {
    const res = await fetch(API_URL + '?action=getMessages&token=' + API_TOKEN);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    chatMessages = data.messages || [];
    chatLoaded = true;
    // Cache messages for instant load next time
    try { setStored('ak_chat_cache', JSON.stringify(chatMessages)); } catch(e) {}
    updateChatBadge();
    renderMessages();
    if (currentTab === 'chat') markChatRead();
    startChatRefresh();
  } catch(err) {
    if (!chatLoaded) {
      document.getElementById('chatEmpty').textContent = 'Could not load messages.';
    }
  }
}

function updateChatBadge() {
  const badge = document.getElementById('chatBadge');
  if (chatMessages.length > lastSeenMessageCount) {
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function markChatRead() {
  lastSeenMessageCount = chatMessages.length;
  setStored('ak_chat_seen', String(lastSeenMessageCount));
  document.getElementById('chatBadge').classList.remove('show');
}

function renderMessages() {
  const container = document.getElementById('messageList');
  if (chatMessages.length === 0) {
    container.innerHTML = '<div class="chat-empty">No messages yet. Be the first to say something!</div>';
    return;
  }
  container.innerHTML = chatMessages.map(m => {
    const isMine = m.name === currentUser;
    const color = getNameColor(m.name);
    return `
      <div class="msg ${isMine ? 'mine' : 'other'}">
        <div class="msg-name" style="color:${color}">${m.name}</div>
        <div class="msg-text">${linkify(m.message)}</div>
        <div class="msg-time">${m.timestamp}</div>
      </div>
    `;
  }).join('');
  scrollChatToBottom();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function linkify(text) {
  const escaped = escapeHtml(text);
  return escaped.replace(
    /(https?:\/\/[^\s<]+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:#448aff; word-break:break-all;">$1</a>'
  );
}

function scrollChatToBottom() {
  setTimeout(() => {
    const container = document.getElementById('messageList');
    container.scrollTop = container.scrollHeight;
  }, 50);
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !currentUser) return;
  gtag('event', 'chat_message', { team_member: currentUser });

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';

  // Optimistic add
  const now = new Date();
  const timeStr = now.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' }) +
    ' ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  chatMessages.push({ name: currentUser, message: text, timestamp: timeStr });
  renderMessages();

  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'postMessage',
        token: API_TOKEN,
        name: currentUser,
        message: text
      })
    });
  } catch(err) {
    showToast('Message failed to send');
    chatMessages.pop();
    renderMessages();
  }
  btn.disabled = false;
  input.focus();
}

function startChatRefresh() {
  if (chatRefreshTimer) clearInterval(chatRefreshTimer);
  // Auto-refresh chat every 15 seconds when on the chat tab
  chatRefreshTimer = setInterval(() => {
    if (currentTab === 'chat') loadMessages();
  }, 15000);
}

// ---- Admin ----
let adminLoaded = false;
let adminSkillsData = null;
let currentAdminSub = 'weapons';

function switchAdminSub(sub) {
  currentAdminSub = sub;
  gtag('event', 'admin_sub_view', { sub_tab: sub, team_member: currentUser });
}

async function loadAdmin() {
  try {
    adminLoaded = true;
    renderAdminAttendance();
  } catch(err) {
    document.getElementById('adminWeaponsView').innerHTML =
      '<p style="text-align:center; color:var(--text-dim); padding:40px;">Could not load admin data.</p>';
  }
}

function renderAdminAttendance() {
  const container = document.getElementById('adminAttendanceView');
  if (!scheduleData || !scheduleData.sessions) {
    container.innerHTML = '<p style="text-align:center; color:var(--text-dim); padding:40px;">No schedule data.</p>';
    return;
  }

  const teamMembers = getTeamMembers();
  // Show upcoming sessions + a few recent past ones
  const now = new Date();
  const sessions = scheduleData.sessions.filter(s => {
    const d = parseDate(s.date);
    return d >= new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000); // last 30 days + future
  });

  if (sessions.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:var(--text-dim); padding:40px;">No upcoming sessions.</p>';
    return;
  }

  // Find index of next upcoming session for auto-scroll
  let nextSessionIdx = sessions.length - 1; // default to last
  for (let i = 0; i < sessions.length; i++) {
    if (parseDate(sessions[i].date) >= now) { nextSessionIdx = i; break; }
  }

  let html = '<div class="admin-grid" id="adminAttendanceGrid"><table class="admin-table"><thead><tr><th>Member</th>';
  sessions.forEach((s, i) => {
    const shortDate = s.date.replace(/, \d{4}$/, '');
    const isNext = (i === nextSessionIdx);
    html += '<th' + (isNext ? ' id="nextPracticeCol"' : '') + '>' + shortDate + '<br><span style="font-weight:400;text-transform:none;">' + s.day + '</span></th>';
  });
  html += '</tr></thead><tbody>';

  teamMembers.forEach(name => {
    html += '<tr><td>' + escapeHtml(name) + '</td>';
    sessions.forEach(s => {
      const status = s.attendance[name] || '';
      const valClass = status ? 'val-' + status : '';
      const safeName = name.replace(/'/g, "\\'");
      const safeDate = s.date.replace(/'/g, "\\'");
      html += '<td><select class="admin-select ' + valClass + '" onchange="adminSetAttendance(\'' + safeName + '\', \'' + safeDate + '\', this.value, this)">';
      html += '<option value="" ' + (status === '' ? 'selected' : '') + '>—</option>';
      html += '<option value="yes" ' + (status === 'yes' ? 'selected' : '') + '>In</option>';
      html += '<option value="maybe" ' + (status === 'maybe' ? 'selected' : '') + '>Maybe</option>';
      html += '<option value="no" ' + (status === 'no' ? 'selected' : '') + '>Out</option>';
      html += '</select></td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  html += '<div class="skill-legend" style="margin-top:12px;">';
  html += '<span><span class="legend-swatch" style="background:var(--yes);"></span> In</span>';
  html += '<span><span class="legend-swatch" style="background:var(--maybe);"></span> Maybe</span>';
  html += '<span><span class="legend-swatch" style="background:var(--no);"></span> Out</span>';
  html += '<span><span class="legend-swatch" style="background:var(--text-dim);"></span> No Response</span>';
  html += '</div>';
  container.innerHTML = html;

  // Auto-scroll to next practice column
  requestAnimationFrame(() => {
    const col = document.getElementById('nextPracticeCol');
    const grid = document.getElementById('adminAttendanceGrid');
    if (col && grid) {
      const stickyWidth = grid.querySelector('th:first-child').offsetWidth;
      grid.scrollLeft = col.offsetLeft - stickyWidth - 8;
    }
  });
}

async function adminSetAttendance(memberName, dateStr, status, selectEl) {
  // Update visual
  selectEl.className = 'admin-select' + (status ? ' val-' + status : '');

  // Update local data
  const session = scheduleData.sessions.find(s => s.date === dateStr);
  if (session) session.attendance[memberName] = status;

  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        token: API_TOKEN,
        action: 'adminUpdateAttendance',
        memberName: memberName,
        date: dateStr,
        status: status
      })
    });
    showToast(memberName + ' — ' + dateStr + ' → ' + (status || 'cleared'));
  } catch(err) {
    showToast('Failed to save — try again');
  }
}

// ---- Pull to Refresh ----
const ptr = document.getElementById('ptrIndicator');
const ptrText = ptr.querySelector('.ptr-text');
let ptrStartY = 0;
let ptrPulling = false;
const PTR_THRESHOLD = 80;

document.addEventListener('touchstart', e => {
  if (window.scrollY === 0) {
    ptrStartY = e.touches[0].clientY;
    ptrPulling = true;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!ptrPulling) return;
  const dy = e.touches[0].clientY - ptrStartY;
  if (dy > 0 && window.scrollY === 0) {
    const h = Math.min(dy * 0.5, PTR_THRESHOLD + 20);
    ptr.style.height = h + 'px';
    if (h >= PTR_THRESHOLD) {
      ptr.classList.add('ready');
      ptrText.textContent = 'Release to refresh';
    } else {
      ptr.classList.remove('ready');
      ptrText.textContent = 'Pull to refresh';
    }
  }
}, { passive: true });

document.addEventListener('touchend', async () => {
  if (!ptrPulling) return;
  ptrPulling = false;
  const isReady = ptr.classList.contains('ready');
  if (isReady) {
    ptr.classList.remove('ready');
    ptr.classList.add('refreshing');
    ptrText.textContent = 'Refreshing...';
    ptr.style.height = '40px';
    await loadData();
    showToast('Updated!');
  }
  ptr.classList.remove('refreshing');
  ptr.style.height = '0';
});

// ---- Service Worker ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ---- Version Check (runs on every app open) ----
async function checkForAppUpdate() {
  try {
    const res = await fetch('./version.json?t=' + Date.now()); // cache-bust
    const data = await res.json();
    if (data.version && data.version !== APP_VERSION) {
      document.getElementById('updateBanner').classList.add('show');
    }
  } catch(e) {}
}

function applyUpdate() {
  // Clear service worker cache and hard reload
  if ('caches' in window) {
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
  }
  if (navigator.serviceWorker) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
  }
  // Force reload from server
  setTimeout(() => window.location.reload(true), 300);
}

// Check on load and every 5 minutes
checkForAppUpdate();
setInterval(checkForAppUpdate, 5 * 60 * 1000);
